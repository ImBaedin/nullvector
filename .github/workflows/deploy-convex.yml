name: Deploy Convex

on:
  push:
    branches:
      - main
    paths:
      - "packages/backend/**"
      - "packages/game-logic/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-convex.yml"
  workflow_dispatch:

concurrency:
  group: convex-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify deploy key is set
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "Missing CONVEX_DEPLOY_KEY secret"
            exit 1
          fi

      - name: Deploy Convex (prod)
        working-directory: packages/backend
        run: bunx convex deploy -y
